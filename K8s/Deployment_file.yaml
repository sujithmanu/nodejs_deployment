apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-deployment
  namespace: nginx

spec:
  replicas: 1

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
      - name: nodejs
        image: sujithmanu/nodejs:tag
        imagePullPolicy: Always

        ports:
        - containerPort: 3000
